name: 校验雇主库

on:
  pull_request:
    paths: ["portals.finance-cn.yml", "scripts/check_portals.py"]
  schedule:
    - cron: "0 0 * * 1"   # 每周一 UTC 00:00 定时体检死链
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Schema + 死链校验
        run: python scripts/check_portals.py --links
