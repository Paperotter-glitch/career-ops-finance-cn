<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15">
  <!-- window -->
  <rect x="0" y="0" width="720" height="440" rx="12" fill="#0d1117" stroke="#30363d"/>
  <rect x="0" y="0" width="720" height="36" rx="12" fill="#161b22"/>
  <rect x="0" y="24" width="720" height="12" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="360" y="23" fill="#8b949e" text-anchor="middle" font-size="13">finance-career-ops · Claude Code</text>

  <g transform="translate(22,66)">
    <!-- line 1: command -->
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
      <text fill="#58a6ff">$ <tspan fill="#c9d1d9">/career-ops scan</tspan>  <tspan fill="#6e7681"># 扫 134 家金融机构在招岗</tspan></text>
    </g>
    <!-- line 2: scanning -->
    <g opacity="0" transform="translate(0,30)"><animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/>
      <text fill="#8b949e">⠿ 匹配中 · 按你的 profile 打分 (A–F)…</text>
    </g>
    <!-- results (机构名做匿名示意) -->
    <g opacity="0" transform="translate(0,66)"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
      <text><tspan fill="#3fb950" font-weight="bold">A</tspan><tspan fill="#3fb950">－</tspan>  <tspan fill="#c9d1d9">某券商系 PE · 投资法务 (Senior)</tspan><tspan fill="#6e7681">      深圳/香港</tspan>  <tspan fill="#3fb950">强匹配</tspan></text>
    </g>
    <g opacity="0" transform="translate(0,94)"><animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.3s" fill="freeze"/>
      <text><tspan fill="#3fb950" font-weight="bold">A</tspan>   <tspan fill="#c9d1d9">某外资投行 PE · Legal Counsel</tspan><tspan fill="#6e7681">   香港</tspan>  <tspan fill="#3fb950">强匹配</tspan></text>
    </g>
    <g opacity="0" transform="translate(0,122)"><animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
      <text><tspan fill="#d29922" font-weight="bold">B</tspan><tspan fill="#d29922">＋</tspan>  <tspan fill="#c9d1d9">某头部信托 · 合规经理</tspan><tspan fill="#6e7681">          深圳</tspan>  <tspan fill="#d29922">良配</tspan></text>
    </g>
    <g opacity="0" transform="translate(0,152)"><animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.3s" fill="freeze"/>
      <text fill="#8b949e">→ 从 <tspan fill="#e8b04b" font-weight="bold">134 家</tspan> 里筛出 8 个真正值得投的岗位</text>
    </g>

    <!-- apply command -->
    <g opacity="0" transform="translate(0,192)"><animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.3s" fill="freeze"/>
      <text fill="#58a6ff">$ <tspan fill="#c9d1d9">/career-ops apply "某外资投行 PE (HK)"</tspan></text>
    </g>
    <g opacity="0" transform="translate(0,222)"><animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.3s" fill="freeze"/>
      <text fill="#3fb950">✓ 简历对齐 + cover letter 草稿已生成</text>
    </g>
    <g opacity="0" transform="translate(0,250)"><animate attributeName="opacity" from="0" to="1" begin="5.5s" dur="0.3s" fill="freeze"/>
      <text><tspan fill="#d29922">⚠ draft-only</tspan> <tspan fill="#6e7681">·</tspan> <tspan fill="#8b949e">绝不自动提交 · 你的数据留在本地，永不上云</tspan></text>
    </g>
    <!-- cursor -->
    <g transform="translate(0,286)">
      <rect x="0" y="-13" width="9" height="17" fill="#c9d1d9"><animate attributeName="opacity" values="1;1;0;0" dur="1s" begin="6s" repeatCount="indefinite"/></rect>
    </g>
  </g>
</svg>
