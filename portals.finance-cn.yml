# Finance-CN Portals — 中国 / 香港 金融行业雇主库 + 岗位筛选词典
# 面向 career-ops 的金融垂直配置。约 134 家:信托 / 券商 / 券商系 PE / 中资投行(HK) / 公募 / 外资行 / PE-VC / AIC / 国资基金。
# 用法:复制为 portals.yml,按你的目标城市与岗位调整 title_filter 与各公司 office_cities。
#
# 说明:中国内地金融业岗位多通过 BOSS 直聘 / 智联 / 猎聘 / 看准 发布;
# 香港 / 外资岗位通常通过公司官网 + LinkedIn + JobsDB 发布。
# 每家公司都标注了 office_cities,可据此按目标城市过滤岗位。

# ============================================================
# 标题筛选(title_filter)— 4 类核心 + 中英双语
# ============================================================

title_filter:
  positive:
    # ---- 投资法务 / Investment Legal ----
    - "投资法务"
    - "法务经理"
    - "法务总监"
    - "Investment Legal"
    - "Legal Counsel"
    - "Senior Legal Counsel"
    - "Legal Manager"
    - "Trust Legal"
    - "Fund Legal"
    - "PE Legal"
    - "VC Legal"
    - "信托法务"
    - "基金法务"
    - "投行法务"
    # ---- 合规 / Compliance ----
    - "合规"
    - "合规经理"
    - "合规总监"
    - "Compliance"
    - "Compliance Officer"
    - "Compliance Manager"
    - "Compliance Director"
    - "Investment Compliance"
    - "Asset Management Compliance"
    - "AML"
    - "Anti-Money Laundering"
    - "反洗钱"
    - "交易合规"
    - "资管合规"
    # ---- 风险管理 / Risk Management ----
    - "风险管理"
    - "风控"
    - "风险经理"
    - "市场风险"
    - "信用风险"
    - "操作风险"
    - "Risk Management"
    - "Risk Manager"
    - "Market Risk"
    - "Credit Risk"
    - "Operational Risk"
    - "Enterprise Risk"
    - "ERM"
    # ---- 法务产品 / Legal AI PM ----
    - "法律 AI"
    - "法务产品"
    - "法律科技"
    - "LegalTech"
    - "RegTech"
    - "Legal AI Product"
    - "AI Product Manager"
    - "法律 AI 产品经理"
    # ---- 兼容 / 相邻岗位 ----
    - "总法律顾问"
    - "General Counsel"
    - "GC"
    - "Head of Legal"
    - "Head of Compliance"

  negative:
    # 明确不匹配的岗位关键词
    - "实习"
    - "Intern"
    - "应届"
    - "Junior"
    - "助理"
    - "销售"
    - "Sales"
    - "BD"
    - "市场推广"
    - "运营"
    - "客户经理"
    - "前台"
    - "出纳"

  seniority_boost:
    # 这些关键词出现,优先级提升
    - "Senior"
    - "Manager"
    - "Director"
    - "高级"
    - "资深"
    - "经理"
    - "总监"
    - "VP"
    - "副总裁"

